<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cloak -->
  <path d="M22 24 L18 50 Q32 54 46 50 L42 24 Z" fill="#2a2030" stroke="#1a1020" stroke-width="0.6"/>
  <!-- Hood/cloak detail -->
  <path d="M24 26 Q32 22 40 26 L38 34 Q32 30 26 34 Z" fill="#3a2a3a" stroke="#2a1a2a" stroke-width="0.4" opacity="0.5"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="7" fill="#4a3a4a" stroke="#3a2a3a" stroke-width="0.6"/>
  <!-- Hood -->
  <path d="M24 18 Q24 8 32 7 Q40 8 40 18" fill="#2a2030" stroke="#1a1020" stroke-width="0.6"/>
  <!-- Left ear (pointed/elven) -->
  <path d="M24 14 L18 8 L24 12" fill="#4a3a4a" stroke="#3a2a3a" stroke-width="0.5"/>
  <!-- Right ear -->
  <path d="M40 14 L46 8 L40 12" fill="#4a3a4a" stroke="#3a2a3a" stroke-width="0.5"/>
  <!-- Eyes -->
  <ellipse cx="29" cy="16" rx="1.2" ry="0.8" fill="#cc3333"/>
  <ellipse cx="35" cy="16" rx="1.2" ry="0.8" fill="#cc3333"/>
  <!-- Bow -->
  <path d="M14 14 Q8 32 14 50" fill="none" stroke="#4a3020" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="14" y1="14" x2="14" y2="50" stroke="#5a4a5a" stroke-width="0.5"/>
  <!-- Arrow -->
  <line x1="14" y1="32" x2="48" y2="32" stroke="#4a3020" stroke-width="1" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M48 32 L44 29 L44 35 Z" fill="#6a6a6a" stroke="#505050" stroke-width="0.3"/>
  <!-- Arrow fletching -->
  <path d="M16 30 L14 32 L16 34" fill="#882222" stroke="none" opacity="0.8"/>
  <!-- Left arm -->
  <path d="M24 28 L14 32" fill="none" stroke="#3a2a3a" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M40 28 Q44 30 46 32" fill="none" stroke="#3a2a3a" stroke-width="2" stroke-linecap="round"/>
  <!-- Belt -->
  <rect x="22" y="38" width="20" height="2" rx="1" fill="#4a3020" opacity="0.7"/>
  <!-- Quiver -->
  <line x1="42" y1="22" x2="44" y2="36" stroke="#4a3020" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="20" x2="44" y2="22" stroke="#6a6a6a" stroke-width="0.8"/>
  <line x1="44" y1="20" x2="45" y2="22" stroke="#6a6a6a" stroke-width="0.8"/>
  <!-- Feet -->
  <path d="M24 50 L22 56 L28 54" fill="#2a1a1a" stroke="#1a0a0a" stroke-width="0.4"/>
  <path d="M40 50 L42 56 L36 54" fill="#2a1a1a" stroke="#1a0a0a" stroke-width="0.4"/>
</svg>
