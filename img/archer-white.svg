<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cloak -->
  <path d="M22 24 L18 50 Q32 54 46 50 L42 24 Z" fill="#d4c8a8" stroke="#b0a480" stroke-width="0.6"/>
  <!-- Hood/cloak detail -->
  <path d="M24 26 Q32 22 40 26 L38 34 Q32 30 26 34 Z" fill="#c4b898" stroke="#b0a480" stroke-width="0.4" opacity="0.5"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="7" fill="#f5eedd" stroke="#c4b89a" stroke-width="0.6"/>
  <!-- Hood -->
  <path d="M24 18 Q24 8 32 7 Q40 8 40 18" fill="#d4c8a8" stroke="#b0a480" stroke-width="0.6"/>
  <!-- Left ear (pointed/elven) -->
  <path d="M24 14 L18 8 L24 12" fill="#f5eedd" stroke="#c4b89a" stroke-width="0.5"/>
  <!-- Right ear -->
  <path d="M40 14 L46 8 L40 12" fill="#f5eedd" stroke="#c4b89a" stroke-width="0.5"/>
  <!-- Eyes -->
  <ellipse cx="29" cy="16" rx="1.2" ry="0.8" fill="#4a8c5a"/>
  <ellipse cx="35" cy="16" rx="1.2" ry="0.8" fill="#4a8c5a"/>
  <!-- Bow (behind body) -->
  <path d="M14 14 Q8 32 14 50" fill="none" stroke="#8b6914" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="14" y1="14" x2="14" y2="50" stroke="#c4b89a" stroke-width="0.5"/>
  <!-- Arrow -->
  <line x1="14" y1="32" x2="48" y2="32" stroke="#8b6914" stroke-width="1" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M48 32 L44 29 L44 35 Z" fill="#a0a0a0" stroke="#808080" stroke-width="0.3"/>
  <!-- Arrow fletching -->
  <path d="M16 30 L14 32 L16 34" fill="#c44" stroke="none" opacity="0.8"/>
  <!-- Left arm (drawing bow) -->
  <path d="M24 28 L14 32" fill="none" stroke="#e8dcc0" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm (holding arrow) -->
  <path d="M40 28 Q44 30 46 32" fill="none" stroke="#e8dcc0" stroke-width="2" stroke-linecap="round"/>
  <!-- Belt -->
  <rect x="22" y="38" width="20" height="2" rx="1" fill="#8b6914" opacity="0.7"/>
  <!-- Quiver hint on back -->
  <line x1="42" y1="22" x2="44" y2="36" stroke="#8b6914" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="20" x2="44" y2="22" stroke="#a0a0a0" stroke-width="0.8"/>
  <line x1="44" y1="20" x2="45" y2="22" stroke="#a0a0a0" stroke-width="0.8"/>
  <!-- Feet -->
  <path d="M24 50 L22 56 L28 54" fill="#8b6914" stroke="#6a5010" stroke-width="0.4"/>
  <path d="M40 50 L42 56 L36 54" fill="#8b6914" stroke="#6a5010" stroke-width="0.4"/>
</svg>
