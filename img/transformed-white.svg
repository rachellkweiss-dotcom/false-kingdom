  <path d="M34 12 Q36 6 38 2 Q35 6 34 10" fill="#f08028" opacity="0.7"/>
  <!-- Eyes - fierce, glowing -->
  <ellipse cx="30" cy="12.5" rx="1.2" ry="0.9" fill="#fff8d0"/>
  <ellipse cx="30.2" cy="12.5" rx="0.5" ry="0.7" fill="#c03008"/>
  <ellipse cx="34" cy="12.5" rx="1.2" ry="0.9" fill="#fff8d0"/>
  <ellipse cx="34.2" cy="12.5" rx="0.5" ry="0.7" fill="#c03008"/>
  <!-- Beak - sharp, pointed -->
  <path d="M32 14 L30 15.5 L32 18 L34 15.5 Z" fill="#d48010" stroke="#b06008" stroke-width="0.3"/>
