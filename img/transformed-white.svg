  <circle cx="56" cy="8" r="0.7" fill="#f5c030" opacity="0.6"/>
  <circle cx="14" cy="18" r="0.6" fill="#f08020" opacity="0.5"/>
  <circle cx="50" cy="16" r="0.5" fill="#f08020" opacity="0.5"/>
