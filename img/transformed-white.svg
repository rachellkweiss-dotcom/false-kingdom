  <path d="M28 14 Q30 8 32 10 Q34 8 36 14 Q34 16 32 15 Q30 16 28 14 Z" fill="#f5d040" stroke="#d4a010" stroke-width="0.5"/>
  <!-- Crown flame crest - tall and dramatic -->
  <path d="M32 10 Q30 2 28 -2 Q31 4 32 8" fill="#e04010" stroke="#c03008" stroke-width="0.3"/>
  <path d="M32 10 Q32 0 32 -4 Q33 2 33 8" fill="#f06018" stroke="#c03008" stroke-width="0.3"/>
  <path d="M32 10 Q34 2 36 -2 Q33 4 32 8" fill="#e04010" stroke="#c03008" stroke-width="0.3"/>
