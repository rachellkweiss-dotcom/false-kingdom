<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body/tunic -->
  <path d="M24 24 L20 50 Q32 54 44 50 L40 24 Z" fill="#d4c8a8" stroke="#b0a480" stroke-width="0.6"/>
  <!-- Head -->
  <circle cx="32" cy="14" r="6.5" fill="#f5eedd" stroke="#c4b89a" stroke-width="0.6"/>
  <!-- Helmet -->
  <path d="M25 14 Q25 6 32 5 Q39 6 39 14" fill="#c0b8a0" stroke="#a09880" stroke-width="0.6"/>
  <!-- Helmet ridge -->
  <path d="M32 4 Q32 6 32 14" fill="none" stroke="#a09880" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="29" cy="14" rx="1" ry="0.8" fill="#4a4a50"/>
  <ellipse cx="35" cy="14" rx="1" ry="0.8" fill="#4a4a50"/>
  <!-- Shield (large, in front) -->
  <path d="M14 20 L14 40 Q14 52 32 56 Q50 52 50 40 L50 20 Z" fill="#c4b070" stroke="#a09050" stroke-width="1"/>
  <!-- Shield inner border -->
  <path d="M18 23 L18 39 Q18 49 32 52 Q46 49 46 39 L46 23 Z" fill="none" stroke="#a09050" stroke-width="0.6" opacity="0.6"/>
  <!-- Shield emblem (cross/star) -->
  <line x1="32" y1="26" x2="32" y2="46" stroke="#8a7a40" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="36" x2="42" y2="36" stroke="#8a7a40" stroke-width="1.5" opacity="0.5"/>
  <!-- Shield rivets -->
  <circle cx="18" cy="23" r="1" fill="#a09050"/>
  <circle cx="46" cy="23" r="1" fill="#a09050"/>
  <circle cx="18" cy="39" r="1" fill="#a09050"/>
  <circle cx="46" cy="39" r="1" fill="#a09050"/>
  <!-- Left arm holding shield -->
  <path d="M24 26 L18 30" fill="none" stroke="#e8dcc0" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M40 26 L46 30" fill="none" stroke="#e8dcc0" stroke-width="2" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M26 50 L24 56 L30 54" fill="#8b6914" stroke="#6a5010" stroke-width="0.4"/>
  <path d="M38 50 L40 56 L34 54" fill="#8b6914" stroke="#6a5010" stroke-width="0.4"/>
</svg>
